<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; height:100dvh; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  #map { position:absolute; top:0; bottom:0; width:100%; height:100%; height:100dvh; }
  .mapboxgl-ctrl-logo { display:none !important; }
  .mapboxgl-ctrl-group {
    background:rgba(255,255,255,0.65) !important; backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);

  .legend {
    position:fixed; bottom:10px; left:10px; z-index:1;
    background:rgba(255,255,255,0.65); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);

    position:absolute; top:8px; right:8px; width:24px; height:24px;

    cursor:pointer; font-size:14px; line-height:24px; text-align:center;

  .legend-toggle:hover { background:rgba(0,0,0,0.15); }
  .legend-borough { display:flex; align-items:center; margin-bottom:3px; cursor:pointer; padding:2px 4px; border-radius:4px; }
  .legend-borough:hover { background:rgba(0,0,0,0.05); }
  .legend-color { width:14px; height:14px; border-radius:3px; margin-right:8px; border:1px solid rgba(0,0,0,0.15); flex-shrink:0; }
  .legend-count { color:#999; font-size:11px; margin-left:auto; padding-left:8px; }
  .mapboxgl-popup-content { padding:14px 20px 14px 18px; font-size:13px; border-radius:10px; max-width:300px; background:rgba(255,255,255,0.65); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); box-shadow:0 4px 16px rgba(0,0,0,0.12); border:1px solid rgba(255,255,255,0.4); }
  .mapboxgl-popup-tip { border-top-color:rgba(255,255,255,0.65) !important; }
  .mapboxgl-popup-close-button { font-size:20px; right:6px; top:4px; padding:2px 6px; color:#888; line-height:1; }
  .mapboxgl-popup-close-button:hover { color:#222; background:rgba(0,0,0,0.06); border-radius:4px; }
  .basemap-switcher {
    position:absolute; top:10px; left:10px; z-index:1;
    background:rgba(255,255,255,0.65); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.4); border-radius:10px;
    padding:6px; box-shadow:0 4px 16px rgba(0,0,0,0.12);
    display:flex; gap:4px; width:260px; justify-content:center;
  }
  .basemap-btn {
    padding:5px 10px; border:1px solid rgba(0,0,0,0.1); border-radius:6px;
    background:rgba(255,255,255,0.5); font-size:11px; cursor:pointer; font-family:inherit;
    color:#444; transition: all 0.15s;
  }
  .basemap-btn:hover { background:rgba(255,255,255,0.8); }
  .basemap-btn.active { background:rgba(30,41,59,0.85); color:#fff; border-color:transparent; }
  .search-box {
    position:absolute; top:53px; left:10px; z-index:2;
    display:flex; gap:0; width:260px;
  }
  .search-box input {
    flex:1; padding:10px 14px; border:1px solid rgba(255,255,255,0.4); border-radius:10px 0 0 10px;
    font-size:14px; font-family:inherit; outline:none;

  .search-suggestions {
    position:absolute; top:calc(100% + 4px); left:0; right:0; z-index:3;
    background:rgba(255,255,255,0.65); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.4);
    border-radius:10px; box-shadow:0 4px 16px rgba(0,0,0,0.12);
    max-height:200px; overflow-y:auto; display:none;

<body>

  <div id="legend-items"></div>
</div>
<script src="config.js"></script>
<script src="assets/zones-data.js"></script>
<script>
const BOROUGH_LABELS = [{"name": "Hackney", "lon": -0.063313, "lat": 51.552274}, {"name": "Lambeth", "lon": -0.121265, "lat": 51.464375}, {"name": "Southwark", "lon": -0.087886, "lat": 51.477843}, {"name": "Tower Hamlets", "lon": -0.035586, "lat": 51.517166}, {"name": "Wandsworth", "lon": -0.186112, "lat": 51.450363}, {"name": "Camden", "lon": -0.15627, "lat": 51.543779}, {"name": "Westminster", "lon": -0.1617, "lat": 51.514108}, {"name": "RBKC", "lon": -0.192776, "lat": 51.501613}, {"name": "Islington", "lon": -0.11026, "lat": 51.548461}, {"name": "H&F", "lon": -0.218678, "lat": 51.490857}];

const BOROUGHS = {"Westminster": {"hue": 0, "short": "WE", "popupName": "Westminster"}, "Camden": {"hue": 220, "short": "CA", "popupName": "Camden"}, "Islington": {"hue": 35, "short": "IS", "popupName": "Islington"}, "Hackney": {"hue": 280, "short": "HA", "popupName": "Hackney"}, "Tower Hamlets": {"hue": 200, "short": "TH", "popupName": "Tower Hamlets"}, "Lambeth": {"hue": 270, "short": "LA", "popupName": "Lambeth"}, "Southwark": {"hue": 100, "short": "SW", "popupName": "Southwark"}, "Wandsworth": {"hue": 50, "short": "WA", "popupName": "Wandsworth"}, "Kensington & Chelsea": {"hue": 160, "short": "KC", "popupName": "RBKC"}, "Hammersmith & Fulham": {"hue": 330, "short": "HF", "popupName": "H&F"}};

mapboxgl.accessToken = window.MAPBOX_TOKEN;

const map = new mapboxgl.Map({
  container: "map",
  style: "mapbox://styles/mapbox/streets-v12",
  center: [-0.1617, 51.5141],
  zoom: 12.5
});

map.addControl(new mapboxgl.NavigationControl(), "top-right");

let selectedZoneId = null;
let selectedBorough = null;
let currentPopup = null;

function clearSelection() {
  selectedZoneId = null;
  selectedBorough = null;
  Object.keys(BOROUGHS).forEach(b => {
    const h = BOROUGHS[b].hue;
    map.setPaintProperty("fill-" + b, "fill-opacity", 0.18);
    map.setPaintProperty("fill-" + b, "fill-color", "hsl(" + h + ", 65%, 55%)");
    map.setPaintProperty("outline-" + b, "line-color", "hsl(" + h + ", 70%, 35%)");
    map.setPaintProperty("outline-" + b, "line-width", 1.5);
  });
  if (currentPopup) { currentPopup.remove(); currentPopup = null; }
}

function addLayers() {
  // Remove existing layers/sources to avoid duplicates
  ["zone-labels", "borough-labels", "city-label"].forEach(id => { if (map.getLayer(id)) map.removeLayer(id); });
  ["label-points", "borough-labels", "city-label"].forEach(id => { if (map.getSource(id)) map.removeSource(id); });
  Object.keys(BOROUGHS).forEach(borough => {
    ["ovl-fill-", "ovl-outline-", "outline-", "fill-"].forEach(pre => {
      if (map.getLayer(pre + borough)) map.removeLayer(pre + borough);
    });
    ["ovl-", "src-"].forEach(pre => {
      if (map.getSource(pre + borough)) map.removeSource(pre + borough);
    });
  });

  Object.keys(BOROUGHS).forEach(borough => {
    const mainFeats = GEOJSON.features.filter(f => f.properties.borough === borough && !f.properties.is_overlap);
    const overlapFeats = GEOJSON.features.filter(f => f.properties.borough === borough && f.properties.is_overlap);
    const h = BOROUGHS[borough].hue;

    map.addSource("src-" + borough, { type: "geojson", data: { type: "FeatureCollection", features: mainFeats } });
    map.addLayer({ id: "fill-" + borough, type: "fill", source: "src-" + borough, paint: { "fill-color": "hsl(" + h + ", 65%, 55%)", "fill-opacity": 0.18 } });
    map.addLayer({ id: "outline-" + borough, type: "line", source: "src-" + borough, paint: { "line-color": "hsl(" + h + ", 70%, 35%)", "line-width": 1.5, "line-opacity": 0.7 } });

    if (overlapFeats.length) {
      map.addSource("ovl-" + borough, { type: "geojson", data: { type: "FeatureCollection", features: overlapFeats } });
      map.addLayer({ id: "ovl-outline-" + borough, type: "line", source: "ovl-" + borough, paint: { "line-color": "hsl(" + h + ", 40%, 70%)", "line-width": 1.2, "line-opacity": 0.4, "line-dasharray": [4, 3] } });
      map.addLayer({ id: "ovl-fill-" + borough, type: "fill", source: "ovl-" + borough, paint: { "fill-color": "transparent", "fill-opacity": 0 } });
    }
  });

  // === ZONE LABELS (visible at zoom >= 13) ===
  const labelFeatures = GEOJSON.features
    .filter(f => f.properties.label_lon && f.properties.label_lat && !f.properties.is_overlap)
    .map(f => ({
      type: "Feature",
      properties: { zone_label: f.properties.zone_label || "", hue: f.properties.hue },
      geometry: { type: "Point", coordinates: [f.properties.label_lon, f.properties.label_lat] }
    }));

  map.addSource("label-points", { type: "geojson", data: { type: "FeatureCollection", features: labelFeatures } });
  map.addLayer({
    id: "zone-labels", type: "symbol", source: "label-points",
    minzoom: 11,
    layout: {
      "text-field": ["get", "zone_label"],
      "text-size": ["interpolate", ["linear"], ["zoom"], 11, 8, 13, 11],
      "text-font": ["DIN Pro Medium", "Arial Unicode MS Regular"],
      "text-allow-overlap": true,
    },
    paint: {
      "text-color": "#1e293b",
      "text-halo-color": "rgba(255,255,255,0.9)",
      "text-halo-width": 0.5,
    }
  });

  // === BOROUGH LABELS (visible at zoom 11-13) ===
  const boroughLabelFeatures = BOROUGH_LABELS.map(b => ({
    type: "Feature",
    properties: { name: b.name },
    geometry: { type: "Point", coordinates: [b.lon, b.lat] }
  }));

  map.addSource("borough-labels", { type: "geojson", data: { type: "FeatureCollection", features: boroughLabelFeatures } });
  map.addLayer({
    id: "borough-labels", type: "symbol", source: "borough-labels",
    minzoom: 9,
    maxzoom: 11,
    layout: {
      "text-field": ["get", "name"],
      "text-size": 14,
      "text-font": ["DIN Pro Bold", "Arial Unicode MS Bold"],
      "text-allow-overlap": true,
    },
    paint: {
      "text-color": "#1e293b",
      "text-halo-color": "rgba(255,255,255,0.9)",
      "text-halo-width": 0.5,
    }
  });

  // === CITY LABEL (visible at zoom < 11) ===
  map.addSource("city-label", { type: "geojson", data: { type: "FeatureCollection", features: [{
    type: "Feature",
    properties: { name: "London" },
    geometry: { type: "Point", coordinates: [-0.12, 51.50] }
  }]}});
  map.addLayer({
    id: "city-label", type: "symbol", source: "city-label",
    maxzoom: 9,
    layout: {
      "text-field": "London",
      "text-size": 18,
      "text-font": ["DIN Pro Bold", "Arial Unicode MS Bold"],
      "text-allow-overlap": true,
    },
    paint: {
      "text-color": "#1e293b",
      "text-halo-color": "rgba(255,255,255,0.9)",
      "text-halo-width": 0.5,
    }
  });
}

function bindClickHandlers() {
  Object.keys(BOROUGHS).forEach(borough => {
    map.on("click", "fill-" + borough, (e) => {
      e.preventDefault();
      const p = e.features[0].properties;
      const zoneId = p.zone_id;
      if (selectedZoneId === zoneId) { clearSelection(); return; }
      clearSelection();
      selectedZoneId = zoneId;
      Object.keys(BOROUGHS).forEach(b => {
        const bh = BOROUGHS[b].hue;
        if (b === borough) {
          map.setPaintProperty("fill-" + b, "fill-opacity", ["case", ["==", ["get", "zone_id"], zoneId], 0.45, 0.08]);
          map.setPaintProperty("fill-" + b, "fill-color", ["case", ["==", ["get", "zone_id"], zoneId], "hsl(30, 90%, 55%)", "hsl(" + bh + ", 65%, 55%)"]);
          map.setPaintProperty("outline-" + b, "line-color", ["case", ["==", ["get", "zone_id"], zoneId], "hsl(30, 90%, 40%)", "hsl(" + bh + ", 70%, 35%)"]);
          map.setPaintProperty("outline-" + b, "line-width", ["case", ["==", ["get", "zone_id"], zoneId], 2.5, 1.5]);
        } else {
          map.setPaintProperty("fill-" + b, "fill-opacity", 0.08);
        }
      });
      if (currentPopup) currentPopup.remove();
      const popupBorough = (BOROUGHS[borough] && BOROUGHS[borough].popupName) ? BOROUGHS[borough].popupName : borough;
      const popupTitle = p.zone_letter ? popupBorough + ' ' + p.zone_letter : popupBorough;
      let popHtml = '<div style="font-weight:700;font-size:16px;color:#1e293b;padding-right:14px;white-space:nowrap">' + popupTitle + '</div>';
      if (p.zone_name) popHtml += '<div style="color:#555;font-size:13px;margin-top:2px">' + p.zone_name + '</div>';
      currentPopup = new mapboxgl.Popup({ maxWidth: "300px", closeButton: true }).setLngLat(e.lngLat).setHTML(popHtml).addTo(map);
      currentPopup.on("close", () => { if (selectedZoneId === zoneId) clearSelection(); });
    });
    map.on("mouseenter", "fill-" + borough, () => map.getCanvas().style.cursor = "pointer");
    map.on("mouseleave", "fill-" + borough, () => map.getCanvas().style.cursor = "");

    // Overlap click — find the matching main zone and trigger its highlight/popup
    if (GEOJSON.features.some(f => f.properties.borough === borough && f.properties.is_overlap)) {
      map.on("click", "ovl-fill-" + borough, (e) => {
        e.preventDefault();
        const p = e.features[0].properties;
        // Find the main zone with matching zone_letter
        const mainZone = GEOJSON.features.find(f => f.properties.borough === borough && !f.properties.is_overlap && f.properties.zone_letter === p.zone_letter);
        if (!mainZone) return;
        const zoneId = mainZone.properties.zone_id;
        if (selectedZoneId === zoneId) { clearSelection(); return; }
        clearSelection();
        selectedZoneId = zoneId;
        Object.keys(BOROUGHS).forEach(b => {
          const bh = BOROUGHS[b].hue;
          if (b === borough) {
            map.setPaintProperty("fill-" + b, "fill-opacity", ["case", ["==", ["get", "zone_id"], zoneId], 0.45, 0.08]);
            map.setPaintProperty("fill-" + b, "fill-color", ["case", ["==", ["get", "zone_id"], zoneId], "hsl(30, 90%, 55%)", "hsl(" + bh + ", 65%, 55%)"]);
            map.setPaintProperty("outline-" + b, "line-color", ["case", ["==", ["get", "zone_id"], zoneId], "hsl(30, 90%, 40%)", "hsl(" + bh + ", 70%, 35%)"]);
            map.setPaintProperty("outline-" + b, "line-width", ["case", ["==", ["get", "zone_id"], zoneId], 2.5, 1.5]);
          } else {
            map.setPaintProperty("fill-" + b, "fill-opacity", 0.08);
          }
        });
        if (currentPopup) currentPopup.remove();
        const ovlPopupBorough = (BOROUGHS[borough] && BOROUGHS[borough].popupName) ? BOROUGHS[borough].popupName : borough;
        let popHtml = '<div style="font-weight:700;font-size:16px;color:#1e293b;padding-right:14px;white-space:nowrap">' + ovlPopupBorough + ' ' + mainZone.properties.zone_letter + '</div>';
        if (mainZone.properties.zone_name) popHtml += '<div style="color:#555;font-size:13px;margin-top:2px">' + mainZone.properties.zone_name + '</div>';
        currentPopup = new mapboxgl.Popup({ maxWidth: "260px", closeButton: true }).setLngLat(e.lngLat).setHTML(popHtml).addTo(map);
        currentPopup.on("close", () => { if (selectedZoneId === zoneId) clearSelection(); });
      });
      map.on("mouseenter", "ovl-fill-" + borough, () => map.getCanvas().style.cursor = "pointer");
      map.on("mouseleave", "ovl-fill-" + borough, () => map.getCanvas().style.cursor = "");
    }
  });

  map.on("click", (e) => {
    if (e.defaultPrevented) return;
    const layers = Object.keys(BOROUGHS).flatMap(b => {
      const l = ["fill-" + b];
      if (map.getLayer("ovl-fill-" + b)) l.push("ovl-fill-" + b);
      return l;
    });
    const features = map.queryRenderedFeatures(e.point, { layers });
    if (!features.length) clearSelection();
  });
}

// Legend toggle
document.getElementById("legend-toggle").addEventListener("click", () => {
  const items = document.getElementById("legend-items");
  const btn = document.getElementById("legend-toggle");
  if (items.style.display === "none") {
    items.style.display = "";
    btn.textContent = "−";
    btn.title = "Hide legend";
  } else {
    items.style.display = "none";
    btn.textContent = "+";
    btn.title = "Show legend";
  }
});

// Search functionality
let searchMarker = null;
let searchPopup = null;

function doSearch() {
  const query = document.getElementById("search-input").value.trim();
  if (!query) return;

  const url = "https://api.mapbox.com/geocoding/v5/mapbox.places/" + encodeURIComponent(query) + ".json"
    + "?access_token=" + mapboxgl.accessToken
    + "&bbox=-0.35,51.4,-0.02,51.62"
    + "&limit=1"
    + "&country=GB";

  fetch(url).then(r => r.json()).then(result => {
    if (!result.features || !result.features.length) {
      alert("Address not found");
      return;
    }

    const [lng, lat] = result.features[0].center;
    const placeName = result.features[0].place_name;

    // Clear previous
    clearSelection();
    if (searchMarker) { searchMarker.remove(); searchMarker = null; }
    if (searchPopup) { searchPopup.remove(); searchPopup = null; }

    // Point-in-polygon check against GeoJSON data
    function pointInPolygon(px, py, ring) {
      let inside = false;
      for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
        const xi = ring[i][0], yi = ring[i][1], xj = ring[j][0], yj = ring[j][1];
        if ((yi > py) !== (yj > py) && px < (xj - xi) * (py - yi) / (yj - yi) + xi) inside = !inside;
      }
      return inside;
    }
    function pointInGeometry(px, py, geom) {
      const polys = geom.type === "MultiPolygon" ? geom.coordinates : [geom.coordinates];
      for (const poly of polys) {
        if (pointInPolygon(px, py, poly[0])) {
          let inHole = false;
          for (let h = 1; h < poly.length; h++) { if (pointInPolygon(px, py, poly[h])) inHole = true; }
          if (!inHole) return true;
        }
      }
      return false;
    }

    const hit = GEOJSON.features.find(f => !f.properties.is_overlap && pointInGeometry(lng, lat, f.geometry));

    let popHtml = '<div style="font-size:12px;color:#888;margin-bottom:4px">' + placeName + '</div>';

    if (hit) {
      const p = hit.properties;
      const borough = p.borough;
      const zoneId = p.zone_id;

      // Highlight the zone
      selectedZoneId = zoneId;
      Object.keys(BOROUGHS).forEach(b => {
        const bh = BOROUGHS[b].hue;
        if (b === borough) {
          map.setPaintProperty("fill-" + b, "fill-opacity", ["case", ["==", ["get", "zone_id"], zoneId], 0.45, 0.08]);
          map.setPaintProperty("fill-" + b, "fill-color", ["case", ["==", ["get", "zone_id"], zoneId], "hsl(30, 90%, 55%)", "hsl(" + bh + ", 65%, 55%)"]);
          map.setPaintProperty("outline-" + b, "line-color", ["case", ["==", ["get", "zone_id"], zoneId], "hsl(30, 90%, 40%)", "hsl(" + bh + ", 70%, 35%)"]);
          map.setPaintProperty("outline-" + b, "line-width", ["case", ["==", ["get", "zone_id"], zoneId], 2.5, 1.5]);
        } else {
          map.setPaintProperty("fill-" + b, "fill-opacity", 0.08);
        }
      });

      const popupBorough = (BOROUGHS[borough] && BOROUGHS[borough].popupName) ? BOROUGHS[borough].popupName : borough;
      const title = p.zone_letter ? popupBorough + ' ' + p.zone_letter : popupBorough;
      popHtml += '<div style="font-weight:700;font-size:16px;color:#1e293b">' + title + '</div>';
      if (p.zone_name) popHtml += '<div style="color:#555;font-size:13px;margin-top:2px">' + p.zone_name + '</div>';
    } else {
      popHtml += '<div style="font-weight:600;font-size:14px;color:#888">Not in a parking zone</div>';
    }

    // Add marker and popup
    searchMarker = new mapboxgl.Marker({ color: "#e74c3c" })
      .setLngLat([lng, lat])
      .addTo(map);

    searchPopup = new mapboxgl.Popup({ maxWidth: "300px", closeButton: true, offset: 30 })
      .setLngLat([lng, lat])
      .setHTML(popHtml)
      .addTo(map);

    searchPopup.on("close", () => {
      if (searchMarker) { searchMarker.remove(); searchMarker = null; }
      clearSelection();
    });

    map.flyTo({ center: [lng, lat], zoom: 14 });
  }).catch(err => {
    console.error("Geocoding error:", err);
    alert("Search failed — check your internet connection");
  });
}

document.getElementById("search-btn").addEventListener("click", () => {
  document.getElementById("search-suggestions").style.display = "none";
  doSearch();
});
let sugIndex = -1;
document.getElementById("search-input").addEventListener("keydown", (e) => {
  const sugBox = document.getElementById("search-suggestions");
  const items = sugBox.querySelectorAll(".search-suggestion");
  if (e.key === "ArrowDown") {
    e.preventDefault();
    sugIndex = Math.min(sugIndex + 1, items.length - 1);
    items.forEach((el, i) => el.style.background = i === sugIndex ? "rgba(0,0,0,0.08)" : "");
    if (items[sugIndex]) {
      document.getElementById("search-input").value = items[sugIndex].dataset.placeName;
      items[sugIndex].scrollIntoView({ block: "nearest" });
    }
  } else if (e.key === "ArrowUp") {
    e.preventDefault();
    sugIndex = Math.max(sugIndex - 1, -1);
    items.forEach((el, i) => el.style.background = i === sugIndex ? "rgba(0,0,0,0.08)" : "");
    if (sugIndex >= 0 && items[sugIndex]) {
      document.getElementById("search-input").value = items[sugIndex].dataset.placeName;
      items[sugIndex].scrollIntoView({ block: "nearest" });
    }
  } else if (e.key === "Enter") {
    sugBox.style.display = "none";
    sugIndex = -1;
    doSearch();
  }
});

let debounceTimer = null;
document.getElementById("search-input").addEventListener("input", (e) => {
  const query = e.target.value.trim();
  const sugBox = document.getElementById("search-suggestions");
  sugBox.scrollTop = 0;
  sugIndex = -1;
  if (query.length < 3) { sugBox.style.display = "none"; return; }
  
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    const url = "https://api.mapbox.com/geocoding/v5/mapbox.places/" + encodeURIComponent(query) + ".json"
      + "?access_token=" + mapboxgl.accessToken
      + "&bbox=-0.35,51.4,-0.02,51.62"
      + "&limit=5"
      + "&country=GB"
      + "&proximity=-0.12,51.50";

    fetch(url).then(r => r.json()).then(result => {
      sugBox.innerHTML = "";
      sugBox.scrollTop = 0;
      if (!result.features || !result.features.length) { sugBox.style.display = "none"; return; }
      
      sugIndex = -1;
      sugBox.scrollTop = 0;
      result.features.forEach(f => {
        const div = document.createElement("div");
        div.className = "search-suggestion";
        div.dataset.placeName = f.place_name;
        const parts = f.place_name.split(",");
        div.innerHTML = parts[0] + (parts.length > 1 ? "<small>" + parts.slice(1).join(",").trim() + "</small>" : "");
        div.addEventListener("click", () => {
          document.getElementById("search-input").value = f.place_name;
          sugBox.style.display = "none";
          doSearch();
        });
        sugBox.appendChild(div);
      });
      sugBox.style.display = "block";
      setTimeout(() => { sugBox.scrollTop = 0; }, 0);
    }).catch(() => { sugBox.style.display = "none"; });
  }, 300);
});

// Select all text on click
document.getElementById("search-input").addEventListener("click", (e) => {
  e.target.select();
});

// Hide suggestions on click outside
document.addEventListener("click", (e) => {
  if (!e.target.closest(".search-box")) {
    document.getElementById("search-suggestions").style.display = "none";
  }
});

// Basemap switcher
document.getElementById("basemap-switcher").addEventListener("click", (e) => {
  const btn = e.target.closest(".basemap-btn");
  if (!btn) return;
  const style = btn.dataset.style;
  document.querySelectorAll(".basemap-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  clearSelection();
  currentStyle = style;
  map.setStyle(style);
});

const DARK_STYLES = ["mapbox://styles/mapbox/satellite-streets-v12", "mapbox://styles/mapbox/dark-v11"];
let currentStyle = "mapbox://styles/mapbox/streets-v12";

function updateLabelColors() {
  const dark = DARK_STYLES.includes(currentStyle);
  const color = dark ? "#ffffff" : "#1e293b";
  const halo = dark ? "rgba(0,0,0,0.7)" : "rgba(255,255,255,0.9)";
  ["zone-labels", "borough-labels", "city-label"].forEach(id => {
    if (map.getLayer(id)) {
      map.setPaintProperty(id, "text-color", color);
      map.setPaintProperty(id, "text-halo-color", halo);
    }
  });
}

// Re-add layers after any style change (including initial load)
map.on("style.load", () => {
  addLayers();
  updateLabelColors();
});

map.on("load", () => {
  // Bind click handlers once only
  bindClickHandlers();

  // Legend
  const legendEl = document.getElementById("legend-items");
  const boroughCounts = {};
  GEOJSON.features.forEach(f => { boroughCounts[f.properties.borough] = (boroughCounts[f.properties.borough] || 0) + 1; });
  Object.keys(BOROUGHS).sort().forEach(borough => {
    const h = BOROUGHS[borough].hue;
    const item = document.createElement("div");
    item.className = "legend-borough";
    item.innerHTML = '<div class="legend-color" style="background:hsl(' + h + ',65%,55%)"></div><span>' + borough + '</span><span class="legend-count">' + (boroughCounts[borough] || 0) + '</span>';
    item.onclick = () => {
      if (selectedBorough === borough) {
        // Deselect - reset and zoom to all
        clearSelection();
        selectedBorough = null;
        const allBounds = new mapboxgl.LngLatBounds();
        GEOJSON.features.forEach(f => {
          const addCoords = (c) => { if (typeof c[0] === "number") allBounds.extend(c); else c.forEach(addCoords); };
          addCoords(f.geometry.coordinates);
        });
        map.fitBounds(allBounds, { padding: 50 });
        return;
      }
      clearSelection();
      selectedBorough = borough;
      // Highlight entire borough
      Object.keys(BOROUGHS).forEach(b => {
        const bh = BOROUGHS[b].hue;
        if (b === borough) {
          map.setPaintProperty("fill-" + b, "fill-opacity", 0.35);
          map.setPaintProperty("fill-" + b, "fill-color", "hsl(" + bh + ", 75%, 50%)");
          map.setPaintProperty("outline-" + b, "line-color", "hsl(" + bh + ", 80%, 30%)");
          map.setPaintProperty("outline-" + b, "line-width", 2.5);
        } else {
          map.setPaintProperty("fill-" + b, "fill-opacity", 0.06);
        }
      });
      // Fly to borough bounds
      const boroughFeats = GEOJSON.features.filter(f => f.properties.borough === borough);
      const bounds = new mapboxgl.LngLatBounds();
      boroughFeats.forEach(f => {
        const addCoords = (c) => { if (typeof c[0] === "number") bounds.extend(c); else c.forEach(addCoords); };
        addCoords(f.geometry.coordinates);
      });
      map.fitBounds(bounds, { padding: 50, maxZoom: 14 });
    };
    legendEl.appendChild(item);
  });
});
</script>
